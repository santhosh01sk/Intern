<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Course Registration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="site-container login-page">
      <header class="site-header">
        <div class="site-brand">
          <span>Course Registration</span>
        </div>
        <a href="index.html">Home</a>
      </header>

      <section class="login-card content-card">
        <p class="eyebrow">Login</p>
        <h1>Enter your details</h1>

        <form id="loginDetailsForm" class="login-form">
          <label for="loginFullName">Name</label>
          <input id="loginFullName" name="name" type="text" placeholder="Your name" required />

          <label for="loginEmailAddress">Email</label>
          <input id="loginEmailAddress" name="email" type="email" placeholder="you@example.com" required />

          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="Password" required />

          <button type="submit" class="btn primary space-top">Log in</button>
          <p class="muted">After login, you will be sent back to the home page.</p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
